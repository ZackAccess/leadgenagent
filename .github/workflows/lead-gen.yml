name: Lead Gen Agent

on:
  schedule:
    - cron: '0 13 * * 1,3,5'   # Mon/Wed/Fri 8:00 AM ET (UTC-5 = 13:00 UTC)
  workflow_dispatch:             # Manual trigger for testing

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download leads database
        uses: actions/download-artifact@v4
        with:
          name: leads-db
          path: data/
        continue-on-error: true   # OK on first run — DB doesn't exist yet

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run Lead Gen Agent
        run: npm start
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MS_GRAPH_TENANT_ID: ${{ secrets.MS_GRAPH_TENANT_ID }}
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          MS_GRAPH_SENDER_EMAIL: ${{ secrets.MS_GRAPH_SENDER_EMAIL }}
          MONDAY_API_KEY: ${{ secrets.MONDAY_API_KEY }}
          MONDAY_LEAD_BOARD_ID: ${{ secrets.MONDAY_LEAD_BOARD_ID }}
          MAX_NEW_OUTREACH_PER_RUN: 20
          MAX_FOLLOWUP_PER_RUN: 30
          DRY_RUN: false

      - name: Upload leads database
        uses: actions/upload-artifact@v4
        if: always()             # Upload even if the run failed
        with:
          name: leads-db
          path: data/leads.db
          retention-days: 90
